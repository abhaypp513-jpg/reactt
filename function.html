<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurable Button</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            height: 100vh;
        }

        .btn{
            padding: 10px 18px;
            outline: none
            border: none;
        }
        .primary{
            background-color: blue;
            color: white;
        }
        .secondary{
            background-color: rgb(197, 195, 195);
            color: black;
        }
        .danger{
            background-color: rgb(255, 0, 0);
            color: white;
        }
    </style>
</head>
<body>
    <script>
        function createButton(text,btnStyle,borderRadius){    
            const btn = document.createElement("button");
            btn.textContent = text;
            btn.classList.add("btn");
            btn.classList.add(btnStyle);
            btn.style.borderRadius = borderRadius;
            document.body.appendChild(btn);
        }
        createButton("Hello 1","primary","10px");
        createButton("Hello 2","secondary","10px");
        createButton("Hello 3","primary","100px");
        createButton("Hello 4","primary","10px");
        createButton("Hello 5","secondary","1px");
        createButton("Hello 6","primary","10px");
        createButton("Hello 7","primary","10px");
        createButton("Hello 8","danger","10px");
        createButton("Hello 9","primary","10px");
        createButton("Hello 10","danger","10px");

    </script>
</body>
</html>
